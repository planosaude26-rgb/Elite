                            <p class="whitespace-pre-line text-slate-700 text-lg font-medium leading-relaxed">${content}</p>
                        </div>
                        <button onclick="handleManualCopy('${mod}', ${section ? `'${section}'` : 'null'})" class="mt-8 flex items-center gap-3 px-10 py-4 bg-elite-blue text-white rounded-2xl font-black uppercase text-xs shadow-xl hover:scale-105 transition-all">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copiar Informação
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function handleCopy(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const notif = document.getElementById('notif');
            notif.classList.remove('translate-y-32');
            setTimeout(() => notif.classList.add('translate-y-32'), 2500);
        }

        document.getElementById('mobile-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('-translate-x-full'));
        window.onload = () => { lucide.createIcons(); navigateTo('dashboard'); };
    </script>
</body>
</html>
